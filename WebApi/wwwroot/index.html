<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SweetCandy — Gestão Profissional</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- OVERLAY MOBILE SIDEBAR -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- SIDEBAR -->
  <div class="sidebar-wrapper" id="sidebar-wrapper">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo"><i class="fa-solid fa-cake-candles"></i></div>
        <div class="brand-text">
          <div class="brand-name">SweetCandy</div>
          <div class="brand-sub">Gestão profissional</div>
        </div>
        <div class="sidebar-toggle" onclick="toggleSidebar()">
          <i class="fa-solid fa-bars sidebar-toggle-icon"></i>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" data-page="dashboard">
          <i class="fa-solid fa-chart-pie nav-icon"></i><span>Painel</span>
        </a>
        <a class="nav-item" data-page="financas">
          <i class="fa-solid fa-wallet nav-icon"></i><span>Finanças</span>
        </a>
        <a class="nav-item" data-page="gestao-caixa">
          <i class="fa-solid fa-cash-register nav-icon"></i><span>Gestão de Caixa</span>
        </a>
        <a class="nav-item" data-page="pedidos">
          <i class="fa-solid fa-clipboard-list nav-icon"></i><span>Pedidos</span>
        </a>
        <a class="nav-item" data-page="orcamentos">
          <i class="fa-solid fa-file-invoice nav-icon"></i><span>Orçamentos</span>
        </a>
        <a class="nav-item" data-page="estoque">
          <i class="fa-solid fa-boxes-stacked nav-icon"></i><span>Estoque</span>
        </a>
        <a class="nav-item" data-page="clientes">
          <i class="fa-solid fa-users nav-icon"></i><span>Clientes</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <i class="fa-solid fa-arrow-right-from-bracket nav-icon" style="color:var(--sidebar-text)"></i>
        <a href="/swagger" target="_blank" class="sidebar-footer-link">Swagger API</a>
      </div>
    </aside>
  </div>

  <!-- MAIN -->
  <div class="main-wrapper">
    <header class="topbar">
      <span class="topbar-title" id="topbar-title">Painel</span>
      <div class="topbar-right">
        <span id="topbar-date"></span>
      </div>
    </header>

    <main class="content" id="content">
      <!-- páginas renderizadas via JS -->
    </main>
  </div>

  <!-- MODAL GLOBAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modal-title">Título</h2>
      <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
